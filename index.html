<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>[4월 타운홀] 에듀윌 AI 리터러시</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
:root { --accent:#E8572A; --blue:#2A7AE8; --green:#27AE60; --purple:#9B59B6; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Noto Sans KR',sans-serif; background:#F5F3EF; color:#1A1A2E; min-height:100vh; }
.q-wrap { max-width:520px; margin:0 auto; padding:0 18px 80px; }
.q-hero { padding:44px 0 32px; }
.q-tag { display:inline-flex; align-items:center; gap:7px; background:#1A1A2E; color:#fff; font-size:11px; font-weight:700; letter-spacing:2.5px; padding:7px 14px; border-radius:4px; margin-bottom:22px; text-transform:uppercase; }
.q-tag .dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:blink 1.4s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.q-hero h1 { font-family:'Gmarket Sans',sans-serif; font-size:clamp(24px,7vw,34px); font-weight:700; line-height:1.25; color:#1A1A2E; margin-bottom:14px; }
.q-hero h1 em { font-style:normal; color:var(--accent); }
.q-hero p { font-size:14px; color:#6B6B6B; line-height:1.7; border-left:3px solid var(--accent); padding-left:12px; }
.q-prog { margin-bottom:24px; }
.q-prog-meta { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
.q-prog-meta span:first-child { font-size:11px; color:#9A9A9A; letter-spacing:2px; font-weight:700; text-transform:uppercase; }
.q-prog-frac { font-family:'Gmarket Sans',sans-serif; font-size:13px; font-weight:700; color:var(--accent); }
.q-prog-track { height:3px; background:#E8E4DC; border-radius:99px; overflow:hidden; }
.q-prog-fill { height:100%; background:var(--accent); border-radius:99px; transition:width .5s ease; }
.q-card { background:#fff; border-radius:20px; padding:28px 24px 24px; margin-bottom:16px; box-shadow:0 2px 0 #E8E4DC,0 8px 32px rgba(0,0,0,.06); position:relative; overflow:hidden; }
.q-card::after { content:''; position:absolute; top:0; left:0; width:100%; height:4px; background:var(--accent); }
.q-num { font-family:'Gmarket Sans',sans-serif; font-size:11px; font-weight:700; color:var(--accent); letter-spacing:3px; text-transform:uppercase; margin-bottom:12px; }
.q-text { font-size:clamp(15px,4vw,17px); font-weight:700; line-height:1.6; color:#1A1A2E; margin-bottom:8px; }
.q-hint { font-size:12px; color:#9A9A9A; margin-bottom:22px; line-height:1.5; }
.likert-labels { display:flex; justify-content:space-between; margin-bottom:10px; }
.likert-labels span { font-size:11px; color:#9A9A9A; }
.likert-row { display:flex; gap:8px; }
.l-btn { flex:1; height:52px; border:2px solid #E8E4DC; border-radius:12px; background:transparent; font-family:'Gmarket Sans',sans-serif; font-size:16px; font-weight:700; color:#9A9A9A; cursor:pointer; transition:all .15s; }
.l-btn:hover { border-color:var(--accent); color:var(--accent); background:#E8572A0D; }
.l-btn.sel { background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 4px 14px #E8572A33; }
.single-list { display:flex; flex-direction:column; gap:9px; }
.s-btn { border:2px solid #E8E4DC; border-radius:12px; padding:13px 16px; background:transparent; cursor:pointer; display:flex; align-items:center; gap:12px; text-align:left; width:100%; transition:all .15s; font-family:'Noto Sans KR',sans-serif; }
.s-btn:hover { border-color:var(--blue); background:#2A7AE80A; }
.s-btn.sel { border-color:var(--blue); background:#2A7AE80D; }
.s-dot { width:20px; height:20px; border-radius:50%; border:2px solid #E8E4DC; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.s-btn.sel .s-dot { border-color:var(--blue); background:var(--blue); }
.s-btn.sel .s-dot::after { content:''; width:7px; height:7px; border-radius:50%; background:#fff; }
.s-icon { font-size:18px; flex-shrink:0; }
.s-text { font-size:14px; color:#1A1A2E; line-height:1.45; font-weight:500; }
.s-btn.sel .s-text { color:var(--blue); font-weight:700; }
.multi-hint { font-size:12px; color:#9A9A9A; background:#F5F3EF; border-radius:8px; padding:10px 14px; margin-bottom:12px; line-height:1.5; }
.multi-list { display:flex; flex-direction:column; gap:9px; }
.m-btn { border:2px solid #E8E4DC; border-radius:12px; padding:12px 16px; background:transparent; cursor:pointer; display:flex; align-items:center; gap:12px; text-align:left; width:100%; transition:all .15s; font-family:'Noto Sans KR',sans-serif; }
.m-btn:hover { border-color:var(--green); background:#27AE600A; }
.m-btn.sel { border-color:var(--green); background:#27AE600D; }
.m-box { width:20px; height:20px; border-radius:5px; border:2px solid #E8E4DC; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; transition:all .15s; }
.m-btn.sel .m-box { border-color:var(--green); background:var(--green); color:#fff; }
.m-text { font-size:14px; color:#1A1A2E; line-height:1.45; font-weight:500; }
.m-btn.sel .m-text { color:var(--green); font-weight:700; }
.q-nav { display:flex; gap:10px; }
.q-btn { flex:1; padding:16px; border:none; border-radius:14px; font-family:'Gmarket Sans',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:all .15s; }
.q-btn:hover:not(:disabled) { filter:brightness(1.06); transform:translateY(-1px); }
.q-btn:disabled { opacity:.3; cursor:not-allowed; transform:none !important; filter:none !important; }
.btn-prev { background:#E8E4DC; color:#9A9A9A; flex:0 0 64px; }
.btn-next { background:#1A1A2E; color:#fff; }
.btn-submit { background:var(--accent); color:#fff; box-shadow:0 4px 18px #E8572A33; }
.r-hero { background:#fff; border-radius:24px; padding:40px 28px 32px; text-align:center; box-shadow:0 2px 0 #E8E4DC,0 12px 40px rgba(0,0,0,.08); margin-bottom:16px; position:relative; overflow:hidden; }
.r-hero-bar { position:absolute; top:0; left:0; right:0; height:4px; }
.r-bg { position:absolute; top:-50px; right:-50px; width:180px; height:180px; border-radius:50%; opacity:.06; }
.r-emoji { font-size:80px; display:block; margin-bottom:18px; }
.r-grade { font-family:'Gmarket Sans',sans-serif; font-size:clamp(28px,8vw,40px); font-weight:700; margin-bottom:8px; }
.r-sub { font-size:14px; color:#9A9A9A; margin-bottom:18px; line-height:1.6; white-space:pre-line; }
.r-pill { display:inline-flex; align-items:center; border-radius:100px; padding:9px 20px; font-family:'Gmarket Sans',sans-serif; font-size:14px; font-weight:700; margin-bottom:20px; border:2px solid; }
.r-desc { font-size:14px; line-height:1.75; color:#6B6B6B; background:#F5F3EF; border-radius:14px; padding:16px; text-align:left; }
.r-breakdown { background:#fff; border-radius:20px; padding:22px 24px; box-shadow:0 2px 0 #E8E4DC,0 8px 24px rgba(0,0,0,.05); margin-bottom:16px; }
.r-breakdown h3 { font-family:'Gmarket Sans',sans-serif; font-size:12px; font-weight:700; color:#9A9A9A; letter-spacing:2px; text-transform:uppercase; margin-bottom:16px; }
.sb-row { display:flex; align-items:center; gap:10px; margin-bottom:11px; }
.sb-row:last-child { margin-bottom:0; }
.sb-lbl { font-size:12px; color:#6B6B6B; width:76px; flex-shrink:0; line-height:1.35; }
.sb-trk { flex:1; height:6px; background:#E8E4DC; border-radius:99px; overflow:hidden; }
.sb-fill { height:100%; border-radius:99px; }
.sb-val { font-family:'Gmarket Sans',sans-serif; font-size:13px; font-weight:700; width:26px; text-align:right; }
.r-submit { width:100%; padding:18px; border:none; border-radius:16px; margin-bottom:12px; display:block; font-family:'Gmarket Sans',sans-serif; font-size:16px; font-weight:700; cursor:pointer; background:#1A1A2E; color:#fff; box-shadow:0 4px 20px rgba(26,26,46,.22); transition:all .2s; }
.r-submit:hover:not(:disabled) { transform:translateY(-2px); }
.r-submit:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.guide-note { background:#E8572A0D; border:1px solid #E8572A22; border-radius:12px; padding:14px 18px; font-size:13px; color:#6B6B6B; line-height:1.6; text-align:center; }
.guide-note strong { color:var(--accent); }
.toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px); background:#1A1A2E; color:#fff; padding:12px 24px; border-radius:100px; font-size:14px; font-weight:700; opacity:0; transition:all .3s; z-index:999; white-space:nowrap; pointer-events:none; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="q-wrap">
  <div class="q-hero">
    <div class="q-tag"><span class="dot"></span>4월 타운홀 · 에듀윌</div>
    <h1>우리 회사<br><em>AI 리터러시</em>는?</h1>
    <p>아래 내용에 솔직하게 응답해 주세요!<br>5가지 질문으로 나의 AI 레벨을 확인합니다.</p>
  </div>
  <div class="q-prog">
    <div class="q-prog-meta">
      <span>PROGRESS</span>
      <span class="q-prog-frac" id="q-frac">1 / 5</span>
    </div>
    <div class="q-prog-track"><div class="q-prog-fill" id="q-fill" style="width:20%"></div></div>
  </div>
  <div id="q-section">
    <div class="q-card" id="q-card">
      <div class="q-num"  id="q-num"></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-hint" id="q-hint"></div>
      <div id="q-options"></div>
    </div>
    <div class="q-nav">
      <button class="q-btn btn-prev" id="q-prev">◀</button>
      <button class="q-btn btn-next" id="q-next">다음 →</button>
    </div>
  </div>
  <div id="q-result" style="display:none;">
    <div class="r-hero" id="r-hero">
      <div class="r-hero-bar" id="r-bar"></div>
      <div class="r-bg" id="r-bg"></div>
      <span class="r-emoji" id="r-emoji"></span>
      <div class="r-grade" id="r-grade"></div>
      <div class="r-sub"   id="r-sub"></div>
      <div class="r-pill"  id="r-pill"></div>
      <div class="r-desc"  id="r-desc"></div>
    </div>
    <div class="r-breakdown">
      <h3>📊 항목별 점수</h3>
      <div id="r-bars"></div>
    </div>
    <button class="r-submit" id="r-submit">📤 전사 결과에 내 점수 반영하기</button>
    <div class="guide-note">결과를 제출하면 <strong>타운홀 대시보드</strong>에<br>에듀윌 전사 AI 리터러시 현황이 실시간 반영됩니다!</div>
  </div>
</div>
<div class="toast" id="q-toast">✅ 결과가 제출되었습니다!</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxDzEvzPEGcEPPhLd2HywbBatPLkMB-xvsVy_5poyGLt_hA5NnA9VDTisbPCojAlpsG/exec';

var TIERS = [
  { min:0,  max:7,  emoji:'🪨', grade:'AI 석기인',  color:'#888888' },
  { min:8,  max:12, emoji:'🌱', grade:'AI 새싹',    color:'#27AE60' },
  { min:13, max:17, emoji:'⚔️', grade:'AI 기사',    color:'#2A7AE8' },
  { min:18, max:21, emoji:'🏆', grade:'AI 챔피언',  color:'#9B59B6' },
  { min:22, max:25, emoji:'👑', grade:'AI 황제',    color:'#E8572A' }
];
var TIER_SUBS = [
  '아직 불조차 발견하지 못했지만,\n지금이 바로 시작할 때!',
  '알고는 있고, 가끔 써보는\n가능성 가득한 새싹!',
  '실전에서 AI를 활용하는\n믿음직한 전사!',
  'AI를 전략적으로 다루는\n검증된 챔피언!',
  '에듀윌 AI 생태계의\n절대 지배자!'
];
var TIER_DESCS = [
  'AI? 그거 먹는 건가요? 😄 걱정 마세요. 모두가 처음엔 그랬습니다. 이번 타운홀을 계기로 첫 발을 내딛어 봐요!',
  'AI를 알고 있고 조금씩 시도해보고 있네요. 꾸준히 써보면서 더 다양한 업무에 적용해 보세요!',
  'AI를 실제 업무에 꾸준히 활용하고 효과도 체감하고 있어요. 조금만 더 파고들면 팀의 AI 리더가 될 수 있어요!',
  'AI를 다양한 업무에 전략적으로 녹여 성과를 만들고 있네요. 주변 동료들에게 노하우를 공유해 주세요!',
  'AI를 전략적으로 활용하고 보안·윤리까지 챙기는 진정한 AI 황제! 🔥 계속 리드해 주세요!'
];
var QUESTIONS = [
  { id:'q1', type:'likert', num:'Q 01', text:'AI 도구는 내 업무 생산성 향상에 도움이 된다.', hint:'평소 AI 기술에 대한 본인의 인식을 솔직하게 선택해주세요.' },
  { id:'q2', type:'single', num:'Q 02', text:'최근 한 달간 업무에서 AI 도구를 활용한 빈도는?', hint:'실제 사용 빈도를 기준으로 선택해주세요.',
    options:[ {icon:'😴',text:'사용한 적 없다',score:0}, {icon:'🤔',text:'1~2회 사용했다',score:2}, {icon:'🙂',text:'주 1~2회 사용했다',score:3}, {icon:'💪',text:'주 3~4회 사용했다',score:4}, {icon:'🔥',text:'거의 매일 사용했다',score:5} ] },
  { id:'q3', type:'multi',  num:'Q 03', text:'실제로 AI를 활용해본 업무 유형을 모두 선택해주세요.', hint:'직접 사용해본 경험이 있는 항목만 선택해주세요. (복수 선택 가능)',
    options:[ {icon:'✍️',text:'문서 작성·초안 생성'}, {icon:'🔍',text:'정보 검색·요약'}, {icon:'💡',text:'아이디어 브레인스토밍'}, {icon:'🌐',text:'번역·외국어 처리'}, {icon:'📊',text:'데이터 분석·정리'}, {icon:'💻',text:'코드 작성·디버깅'}, {icon:'🖼️',text:'이미지·디자인 생성'}, {icon:'📅',text:'일정·업무 정리'} ] },
  { id:'q4', type:'single', num:'Q 04', text:'본인의 AI 활용 수준을 가장 잘 표현하는 것은?', hint:'현재 본인의 실제 수준을 기준으로 선택해주세요.',
    options:[ {icon:'🪨',text:'AI? 잘 모르겠다 / 아직 시작 전',score:1}, {icon:'🌱',text:'들어봤고 가끔 써보긴 했다',score:2}, {icon:'⚙️',text:'목적에 맞게 골라서 쓸 수 있다',score:3}, {icon:'🎯',text:'프롬프트를 다듬어 원하는 결과를 끌어낸다',score:4}, {icon:'👑',text:'AI를 업무에 적극 녹여 성과로 만든다',score:5} ] },
  { id:'q5', type:'likert', num:'Q 05', text:'AI를 사용할 때 개인정보나 기밀 정보 입력에 주의해야 한다고 생각한다.', hint:'AI 윤리와 보안에 대한 본인의 인식을 선택해주세요.' }
];

var cur = 0;
var ANS = { q1:null, q2:null, q3:[], q4:null, q5:null };

function g(id) { return document.getElementById(id); }
function tierFor(score) { for(var i=0;i<TIERS.length;i++) if(score>=TIERS[i].min&&score<=TIERS[i].max) return TIERS[i]; return TIERS[0]; }
function tierIdxFor(score) { for(var i=0;i<TIERS.length;i++) if(score>=TIERS[i].min&&score<=TIERS[i].max) return i; return 0; }

function renderQ() {
  var q = QUESTIONS[cur];
  g('q-num').textContent  = q.num;
  g('q-text').textContent = q.text;
  g('q-hint').textContent = q.hint;
  g('q-frac').textContent = (cur+1)+' / 5';
  g('q-fill').style.width = ((cur+1)/5*100)+'%';
  g('q-prev').disabled    = (cur===0);
  var nb = g('q-next');
  if(cur===4){nb.textContent='결과 보기 🎯';nb.className='q-btn btn-submit';}
  else{nb.textContent='다음 →';nb.className='q-btn btn-next';}
  var el=g('q-options'); el.innerHTML='';
  if(q.type==='likert') buildLikert(q,el);
  else if(q.type==='single') buildSingle(q,el);
  else buildMulti(q,el);
}

function buildLikert(q,c) {
  var val=ANS[q.id];
  var labels=document.createElement('div'); labels.className='likert-labels';
  labels.innerHTML='<span>전혀 그렇지 않다</span><span>매우 그렇다</span>'; c.appendChild(labels);
  var row=document.createElement('div'); row.className='likert-row';
  [1,2,3,4,5].forEach(function(n){
    var b=document.createElement('button'); b.className='l-btn'+(val===n?' sel':''); b.textContent=String(n);
    b.addEventListener('click',function(){ANS[q.id]=n;renderQ();}); row.appendChild(b);
  }); c.appendChild(row);
}

function buildSingle(q,c) {
  var val=ANS[q.id]; var wrap=document.createElement('div'); wrap.className='single-list';
  q.options.forEach(function(opt,i){
    var b=document.createElement('button'); b.className='s-btn'+(val===i?' sel':'');
    b.innerHTML='<span class="s-dot"></span><span class="s-icon">'+opt.icon+'</span><span class="s-text">'+opt.text+'</span>';
    b.addEventListener('click',function(){ANS[q.id]=i;renderQ();}); wrap.appendChild(b);
  }); c.appendChild(wrap);
}

function buildMulti(q,c) {
  var hint=document.createElement('div'); hint.className='multi-hint'; hint.textContent='복수 선택 가능 — 직접 사용해본 항목만 체크하세요'; c.appendChild(hint);
  var wrap=document.createElement('div'); wrap.className='multi-list';
  q.options.forEach(function(opt,i){
    var isSel=ANS[q.id].indexOf(i)!==-1; var b=document.createElement('button');
    b.className='m-btn'+(isSel?' sel':'');
    b.innerHTML='<span class="m-box">'+(isSel?'✓':'')+'</span><span class="s-icon">'+opt.icon+'</span><span class="m-text">'+opt.text+'</span>';
    b.addEventListener('click',function(){ var idx=ANS[q.id].indexOf(i); if(idx===-1)ANS[q.id].push(i); else ANS[q.id].splice(idx,1); renderQ(); });
    wrap.appendChild(b);
  }); c.appendChild(wrap);
}

function goNext() {
  var q=QUESTIONS[cur];
  if((q.type==='likert'||q.type==='single')&&ANS[q.id]===null){ doShake(); return; }
  if(cur<4){cur++;renderQ();}else showResult();
}

function doShake() {
  var card=g('q-card'); var moves=[8,-8,6,-6,3,-3,0]; var i=0;
  function step(){ card.style.transform='translateX('+moves[i]+'px)'; i++; if(i<moves.length)setTimeout(step,50); }
  step();
}

function calcScores() {
  var s1=ANS.q1!==null?ANS.q1:0;
  var s2=ANS.q2!==null?QUESTIONS[1].options[ANS.q2].score:0;
  var s3=Math.min(5,Math.round(ANS.q3.length/8*5*10)/10);
  var s4=ANS.q4!==null?QUESTIONS[3].options[ANS.q4].score:0;
  var s5=ANS.q5!==null?ANS.q5:0;
  return {s1:s1,s2:s2,s3:s3,s4:s4,s5:s5,total:s1+s2+s3+s4+s5};
}

function showResult() {
  g('q-section').style.display='none'; g('q-result').style.display='block'; window.scrollTo(0,0);
  var sc=calcScores(); var ti=tierFor(sc.total); var idx=tierIdxFor(sc.total);
  g('r-emoji').textContent=ti.emoji; g('r-grade').textContent=ti.grade; g('r-grade').style.color=ti.color;
  g('r-sub').textContent=TIER_SUBS[idx]; g('r-desc').textContent=TIER_DESCS[idx];
  g('r-bg').style.background=ti.color; g('r-bar').style.background='linear-gradient(90deg,'+ti.color+',#f87171)';
  var pill=g('r-pill'); pill.textContent='총점 '+sc.total+' / 25점';
  pill.style.background=ti.color+'18'; pill.style.borderColor=ti.color+'55'; pill.style.color=ti.color;
  var barDefs=[
    {label:'AI 생산성<br>인식',val:sc.s1,color:'#E8572A'},{label:'실제 활용<br>빈도',val:sc.s2,color:'#2A7AE8'},
    {label:'AI 활용<br>다양성',val:sc.s3,color:'#27AE60'},{label:'AI 자기<br>역량',val:sc.s4,color:'#9B59B6'},
    {label:'AI 보안<br>인식',val:sc.s5,color:'#E84E4E'}
  ];
  var bEl=g('r-bars'); bEl.innerHTML='';
  barDefs.forEach(function(b){
    var pct=Math.round(b.val/5*100); var row=document.createElement('div'); row.className='sb-row';
    row.innerHTML='<div class="sb-lbl">'+b.label+'</div><div class="sb-trk"><div class="sb-fill" style="width:'+pct+'%;background:'+b.color+'"></div></div><div class="sb-val" style="color:'+b.color+'">'+(Math.round(b.val*10)/10)+'</div>';
    bEl.appendChild(row);
  });
  window._saved={total:sc.total,tier:ti.grade,emoji:ti.emoji,s1:sc.s1,s2:sc.s2,s3:sc.s3,s4:sc.s4,s5:sc.s5};
}

function doSubmit() {
  var r=window._saved; if(!r) return;
  var btn=g('r-submit'); btn.textContent='⏳ 제출 중...'; btn.disabled=true;
  var formData=new FormData();
  formData.append('total',r.total); formData.append('tier',r.tier); formData.append('emoji',r.emoji);
  formData.append('s1',r.s1); formData.append('s2',r.s2); formData.append('s3',r.s3); formData.append('s4',r.s4); formData.append('s5',r.s5);
  fetch(SCRIPT_URL,{method:'POST',body:formData})
    .then(function(){ showToast('✅ 결과가 제출되었습니다!'); btn.textContent='✅ 제출 완료!'; })
    .catch(function(){ showToast('✅ 제출되었습니다!'); btn.textContent='✅ 제출 완료!'; });
}

function showToast(msg) {
  var t=g('q-toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},3000);
}

g('q-prev').addEventListener('click',function(){if(cur>0){cur--;renderQ();}});
g('q-next').addEventListener('click',goNext);
g('r-submit').addEventListener('click',doSubmit);
renderQ();
</script>
</body>
</html>
